<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <link rel="stylesheet" href="../../Libraries/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../stylesheets/Admin/addingProduct.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="container-fluid px-0">
            <div class="card-add-product">
                <h1 class="card-title">Add Product</h1>
                <form id="addProductForm" class="needs-validation" novalidate>
                    <div class="row g-4">
                        <div class="col-lg-6">
                            <div class="mb-3">
                                <label class="form-label" for="title">Title</label>
                                <input type="text" id="title" class="form-control" placeholder="Product title" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="price">Price</label>
                                <input type="number" id="price" class="form-control" placeholder="0.00" min="0" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="category">Category</label>
                                <input type="text" id="category" class="form-control" placeholder="Category name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="slug">Slug</label>
                                <input type="text" id="slug" class="form-control" placeholder="product-title-slug">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="sku">SKU</label>
                                <input type="text" id="sku" class="form-control" placeholder="SKU code">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="description">Description</label>
                                <textarea id="description" class="form-control" placeholder="Short description"></textarea>
                            </div>
                        </div>

                        <div class="col-lg-6">
                            <div class="mb-3">
                                <label class="form-label" for="stockStatus">Stock status</label>
                                <select id="stockStatus" class="form-select" required>
                                    <option value="in_stock">In Stock</option>
                                    <option value="low_stock">Low Stock</option>
                                    <option value="out_of_stock">Out of Stock</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="quantity">Available quantity</label>
                                <input type="number" id="quantity" class="form-control" placeholder="0" min="0" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Images</label>
                                <label class="image-upload-area mb-0">
                                    <div class="image-upload-icon">+</div>
                                    <span>Choose product images</span>
                                    <input type="file" id="imagesInput" multiple accept="image/*">
                                </label>
                                <div class="image-preview-list"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Colors</label>
                                <div class="color-dots">
                                    <span class="color-dot" style="background-color: #fbbf24;"></span>
                                    <span class="color-dot" style="background-color: #f97316;"></span>
                                    <span class="color-dot" style="background-color: #22c55e;"></span>
                                    <span class="color-dot" style="background-color: #3b82f6;"></span>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Sizes</label>
                                <div class="size-options">
                                    <button type="button" class="size-pill">S</button>
                                    <button type="button" class="size-pill active">M</button>
                                    <button type="button" class="size-pill">X</button>
                                    <button type="button" class="size-pill">XL</button>
                                    <button type="button" class="size-pill">XXL</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <button type="submit" class="btn btn-save">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../../Libraries/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../scripts/Admin/addingProduct.js"></script>
</body>
</html>
