<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers</title>
    <link rel="stylesheet" href="../../Libraries/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../../stylesheets/Admin/product.css" />
    <link rel="stylesheet" href="../../stylesheets/Admin/admin.css" />
</head>

<body>
    <!-- TOPBAR -->
    <div id="topbar" data-component="admintopbar"></div>

    <div class="d-flex">
      <!-- SIDEBAR -->
      <div id="sidebar" data-component="sidebar"></div>
       
        <main class="flex-grow-1 p-4">
            <div class="page-wrapper">
                <div class="container-fluid px-0">
                    <div class="card-products">
                        <div class="card-header-custom">
                            <h1 class="card-title mb-0">Customers</h1>
                            <div class="d-flex align-items-center gap-3 flex-wrap">
                                <div class="search-wrapper">
                                    <img class="search-icon"
                                        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='1.5' stroke='%239ca3af'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z' /%3E%3C/svg%3E"
                                        alt="" />
                                    <input type="search" id="customersSearch" class="form-control"
                                        placeholder="Search customers" />
                                </div>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 table-products table-products--people">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="text-center sort-header">
                                            <button type="button" class="sort-button" data-sort="name"
                                                aria-label="Sort by name">
                                                ⇅
                                            </button>
                                        </th>
                                        <th scope="col">Name</th>
                                        <th scope="col">Email</th>
                                        <th scope="col">Shipping Address</th>
                                        <th scope="col" class="text-end">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="customersTableBody">
                                    <!-- Example row matching product.html style for customer mock -->
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between align-items-center border-top px-4 py-3">
                            <small id="customersInfo" class="text-muted">Showing 0–0 of 0 customers</small>
                            <nav>
                                <ul id="customersPagination" class="pagination mb-0 pagination-sm custom-pagination">
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../Libraries/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../scripts/Admin/customer.js"></script>
    <script src="../../scripts/layoutManager.js"></script>
</body>

</html>
