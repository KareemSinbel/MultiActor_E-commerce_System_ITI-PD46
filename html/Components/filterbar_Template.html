<div class="card p-3" id="filters-card">
    <h6 class="mb-3">Categories</h6>
    <div id="category-filters-container"></div>

    <h6 class="mt-4">Color</h6>
    <div class="d-flex gap-2 mb-3" id="color-filters-container">
        <span class="color-circle-container selected">
            <span class="color-circle bg-warning"></span>
        </span>
        <span class="color-circle-container">
            <span class="color-circle bg-secondary"></span>
        </span>
        <span class="color-circle-container">
            <span class="color-circle bg-danger"></span>
        </span>
    </div>

    <h6 class="mt-4">Size</h6>
    <div class="d-flex flex-wrap gap-2" id="size-filters-container">
        <button class="btn btn-outline-secondary btn-sm">S</button>
        <button class="btn btn-outline-secondary btn-sm">M</button>
        <button class="btn btn-outline-secondary btn-sm">L</button>
    </div>
</div>
