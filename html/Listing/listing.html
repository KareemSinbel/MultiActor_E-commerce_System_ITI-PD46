<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../../Libraries/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../stylesheets/Listing/listing.css">
</head>
<body>
    <div id="main-container" class="container-fluid m-0 p-0">
        <!-- topbar -->
        <div id="topbar-container" data-component="topbar"></div>

        <!-- navbar -->
        <div id="navbar-container" data-component="navbar"></div>
        <!-- end nav bar -->

        <!-- start body -->
        <button 
            class="btn btn-dark mb-3 d-lg-none"
            data-bs-toggle="offcanvas"
            data-bs-target="#filtersCanvas">
            <i class="fa-solid fa-filter"></i> Filters
        </button>

        <div id="container" class="container mt-4">
            <div class="row">
                <!-- filter bar -->
                <aside id="filterbar" class="col-lg-3 mb-4 d-none d-lg-block">
                    <div data-component="filterbar"></div>
                </aside>

                <!-- products -->
                <main class="col-12 col-md-8 col-lg-9">
                    <div id="products-container" class="row g-4">
                        <div class="col-12 col-sm-6 col-lg-4">
                            <div id="cartItem-container" data-component="cartItem"></div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4">
                            <div id="cartItem-container" data-component="cartItem"></div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4">
                            <div id="cartItem-container" data-component="cartItem"></div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4">
                            <div id="cartItem-container" data-component="cartItem"></div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4">
                            <div id="cartItem-container" data-component="cartItem"></div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4">   
                            <div id="cartItem-container" data-component="cartItem"></div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-center mt-5">
                        <nav>
                            <ul class="pagination" id="pagination">
                                <li class="page-item disabled">
                                    <a class="page-link" href="#">«</a>
                                </li>

                                <li class="page-item active">
                                    <a class="page-link" href="#">1</a>
                                </li>

                                <li class="page-item">
                                    <a class="page-link" href="#">2</a>
                                </li>

                                <li class="page-item">
                                    <a class="page-link" href="#">3</a>
                                </li>

                                <li class="page-item">
                                    <a class="page-link" href="#">»</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </main>
            </div>
        </div>
        <!-- end body -->

        <!-- OFFCANVAS FILTER (mobile only, always in DOM) -->
        <div class="offcanvas offcanvas-start" tabindex="-1" id="filtersCanvas">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title">Filters</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <div data-component="filterbar"></div>
            </div>
        </div>


        <!-- start NewsLetter  -->
        <div id="footer-container" data-component="newsletter"></div>

        <!--start footer-->
        <div id="footer-container" data-component="footer"></div>
        <!--end footer-->
    </div>
    <script src="../../Libraries/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../scripts/layoutManager.js"></script>
</body>
</html>
