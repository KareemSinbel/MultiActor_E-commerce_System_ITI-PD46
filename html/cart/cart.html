<div class="container py-4 py-md-5 px-3">
    <div class="row gx-lg-5 justify-content-between">
        <div class="col-12 col-lg-7">
            <h5 class="fw-bold mb-4">Your cart</h5>
            
            <div class="row cart-table mb-3 mx-0 d-none d-md-flex">
                <div class="col-6 th">Product</div>
                <div class="col-2 th">Price</div>
                <div class="col-3 th text-center">Quantity</div>
            </div>

            <div id="cart-items-container">
                <div class="text-center py-5 w-100">
                    <div class="spinner-border text-dark" role="status"></div>
                    <p class="mt-3 text-muted mb-0">Loading cart...</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-4 mt-4 mt-lg-0 order-summary-wrapper">
            <div class="order-summary-card">
                <h5 class="fw-bold mb-4">Order Summary</h5>
                
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-secondary">Subtotal</span>
                    <span id="cart-subtotal" class="fw-bold">$0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-secondary">Shipping:</span>
                    <span id="cart-shipping" class="fw-bold">Free</span>
                </div>
                <div class="d-flex justify-content-between mb-4 pb-4 border-bottom">
                    <span class="text-secondary">Tax:</span>
                    <span id="cart-tax" class="fw-bold">$0.00</span>
                </div>
                
                <div class="d-flex justify-content-between mb-4">
                    <span class="fw-bold h5">Total</span>
                    <span id="cart-total" class="fw-bold h5">$0.00</span>
                </div>

                <button id="checkout-button" class="btn btn-dark-custom w-100 py-3 mb-3 text-uppercase">Checkout</button>
                <div class="text-center">
                    <a href="../Home/home.html" class="text-dark small fw-bold text-decoration-underline">Continue Shopping</a>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

    <div class="modal fade" id="checkoutConfirmModal" tabindex="-1" aria-labelledby="checkoutConfirmModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="checkoutConfirmModalLabel">Confirm Payment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to proceed with payment?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-dark" id="confirm-checkout-button">Yes, Pay Now</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../scripts/Authentecation/auth.js"></script>
    <script src="../../Libraries/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../scripts/layoutManager.js"></script>
    <script src="../../scripts/helpers.js" type="module"></script>
    <script src="../../scripts/cart/cart.js" type="module"></script>
</body>
</html>
